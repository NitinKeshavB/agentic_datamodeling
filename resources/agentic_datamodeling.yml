resources:
  jobs:
    agentic_datamodeling:
      name: "[${bundle.target}] Agentic Data Modeling"

      tasks:
        - task_key: run_pipeline
          python_wheel_task:
            package_name: agentic-datamodeling
            entry_point: main
            parameters:
              - "--source"
              - "unity_catalog"
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          libraries:
            - whl: ${workspace.file_path}/.internal/*.whl
          environment_key: serverless

      environments:
        - environment_key: serverless
          spec:
            client: "1"

      schedule:
        quartz_cron_expression: "0 0 8 * * ?"
        timezone_id: "America/Chicago"
        pause_status: PAUSED

      permissions:
        - level: CAN_VIEW
          group_name: "datamodeling_hackathon"
