resources:
  jobs:
    catalog_discovery:
      name: "[${bundle.target}] Catalog Relationship Discovery"
      description: "Crawls Unity Catalog schema, detects table relationships, profiles data quality, and runs AI agent analysis."

      tasks:
        - task_key: discover_relationships
          python_wheel_task:
            package_name: agentic-datamodeling
            entry_point: discover
            parameters:
              - "--source"
              - "unity_catalog"
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          libraries:
            - whl: ${workspace.file_path}/.internal/*.whl
          environment_key: serverless

      environments:
        - environment_key: serverless
          spec:
            client: "1"

      job_clusters: []

      permissions:
        - level: CAN_VIEW
          group_name: "datamodeling_hackathon"
